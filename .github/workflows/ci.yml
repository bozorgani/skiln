name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 5000
      MONGO_URI: mongodb://127.0.0.1:27017/skiln_ci
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-test-secret-change-in-production
      ENABLE_RATE_LIMIT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Syntax check
        run: node -c server.js && find src -name '*.js' -print0 | xargs -0 -n1 node -c
      - name: Smoke test API
        run: |
          npm start > /tmp/skiln-backend.log 2>&1 &
          echo $! > /tmp/skiln-backend.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/api/health >/dev/null; then break; fi
            sleep 2
          done
          npm run smoke:ci
          kill $(cat /tmp/skiln-backend.pid)
      - name: Security audit
        run: npm audit --audit-level=high

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --runInBand --silent
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high

  admin-panel:
    name: Admin panel checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-panel/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Security audit
        run: npm audit --audit-level=high
