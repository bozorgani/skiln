openapi: 3.0.3
info:
  title: Skiln LMS API
  version: 1.1.0
  description: |
    مستندات اولیه API برای فاز Production Readiness. این فایل endpointهای اصلی را پوشش می‌دهد و باید همراه با توسعه محصول کامل‌تر شود.
servers:
  - url: http://localhost:5000/api
    description: Local development
  - url: https://api.skiln.ir/api
    description: Production example
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, teacher, student]
    Course:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        status:
          type: string
          enum: [draft, published]
        category:
          type: string
        level:
          type: string
          enum: [Beginner, Intermediate, Advanced]
    Blog:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        category:
          type: string
        isPublished:
          type: boolean
    Payment:
      type: object
      properties:
        paymentId:
          type: string
        orderId:
          type: string
        amount:
          type: number
        provider:
          type: string
        status:
          type: string
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API is healthy
  /auth/public/send-code:
    post:
      summary: Send OTP for public frontend login/register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber]
              properties:
                phoneNumber:
                  type: string
                  example: '09123456789'
      responses:
        '200':
          description: Verification code sent
        '429':
          description: Rate limit exceeded
  /auth/public/verify-code:
    post:
      summary: Verify public OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, code]
              properties:
                phoneNumber:
                  type: string
                code:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Login/register successful
  /auth/send-code:
    post:
      summary: Send admin-panel OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber]
              properties:
                phoneNumber:
                  type: string
      responses:
        '200':
          description: Verification code sent
        '403':
          description: Phone is not allowed for admin panel
  /auth/verify-code:
    post:
      summary: Verify admin-panel OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, code]
              properties:
                phoneNumber:
                  type: string
                code:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Admin login successful
  /auth/me:
    get:
      summary: Current user profile
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Current user
  /courses:
    get:
      summary: List courses
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: level
          schema: { type: string, enum: [Beginner, Intermediate, Advanced] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 12 }
      responses:
        '200':
          description: Course list with pagination
    post:
      summary: Create course
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '201':
          description: Course created
  /courses/{id}:
    get:
      summary: Get course by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Course details
    put:
      summary: Update course
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Course updated
  /blogs:
    get:
      summary: List blog posts
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: tag
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 12 }
      responses:
        '200':
          description: Blog list with pagination
    post:
      summary: Create blog post
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '201':
          description: Blog post created
  /blogs/{idOrSlug}:
    get:
      summary: Get blog by id or slug
      parameters:
        - in: path
          name: idOrSlug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Blog details
  /payments/create-intent:
    post:
      summary: Create payment intent for a course
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId:
                  type: string
                couponCode:
                  type: string
      responses:
        '201':
          description: Payment intent created
  /payments/test-payment:
    post:
      summary: Complete mock/test payment
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentId:
                  type: string
                orderId:
                  type: string
      responses:
        '200':
          description: Test payment completed
  /categories:
    get:
      summary: List categories
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [course, blog] }
      responses:
        '200':
          description: Categories retrieved
    post:
      summary: Create category
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '201':
          description: Category created
  /contact/messages:
    post:
      summary: Create contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                subject: { type: string }
                message: { type: string }
      responses:
        '201':
          description: Contact message created
    get:
      summary: List contact messages
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Admin contact message list
  /courses/{courseId}/reviews:
    get:
      summary: List approved course reviews
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Course reviews retrieved
    post:
      summary: Create course review
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating, content]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                title: { type: string }
                content: { type: string }
      responses:
        '201':
          description: Review created and waiting for moderation
  /reviews:
    get:
      summary: List all reviews for moderation
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Reviews retrieved
  /reviews/{id}/moderate:
    put:
      summary: Approve or reject review
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isApproved]
              properties:
                isApproved: { type: boolean }
      responses:
        '200':
          description: Review moderated
  /certificates/user/my-certificates:
    get:
      summary: List current user's certificates
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: User certificates
  /certificates/verify/{certificateNumber}:
    get:
      summary: Verify a certificate publicly
      parameters:
        - in: path
          name: certificateNumber
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Certificate is valid
        '404':
          description: Certificate not found
  /certificates/{courseId}:
    get:
      summary: Download course completion certificate as PDF
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: PDF certificate
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /certificates/{courseId}/meta:
    get:
      summary: Get certificate metadata for a completed course
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Certificate metadata
  /uploads/images:
    post:
      summary: Upload image
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Image uploaded to local or S3-compatible storage
  /uploads/videos:
    post:
      summary: Upload video
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [video]
              properties:
                video:
                  type: string
                  format: binary
      responses:
        '201':
          description: Video uploaded to local or S3-compatible storage
  /payments/zarinpal/callback:
    get:
      summary: Zarinpal callback and verification
      parameters:
        - in: query
          name: paymentId
          required: true
          schema: { type: string }
        - in: query
          name: Authority
          schema: { type: string }
        - in: query
          name: Status
          schema: { type: string }
      responses:
        '302':
          description: Redirects to frontend success or failed page
  /payments/{id}/retry:
    post:
      summary: Retry failed or pending payment
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Retry URL generated
  /payments/{id}/receipt:
    get:
      summary: Get payment receipt
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Payment receipt
  /payments/{id}:
    get:
      summary: Get payment details
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Payment details
